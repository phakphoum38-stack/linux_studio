name: linux_studio

description: Linux Studio - Flutter + iSH Mobile Linux Platform

publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5

  # File Manager
  file_picker: ^10.3.2
  path_provider: ^2.1.5
  archive: ^4.0.7

  # Local Storage
  shared_preferences: ^2.5.3

  # SSH Support
  dartssh2: ^2.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
