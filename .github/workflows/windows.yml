name: Linux Studio Windows Build

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:


jobs:

  windows-build:

    runs-on: windows-latest


    defaults:
      run:
        working-directory: generated_app


    steps:


      - name: Checkout
        uses: actions/checkout@v4



      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true



      - name: Flutter Doctor
        run: flutter doctor -v



      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop



      - name: Clean
        run: flutter clean



      - name: Dependencies
        run: flutter pub get



      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings



      - name: Check Windows Device
        run: flutter devices



      - name: Build Windows Debug
        run: flutter build windows --debug -v



      - name: Build Windows Release
        run: flutter build windows --release -v



      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-studio-windows
          path: generated_app/build/windows/x64/runner/Release
          if-no-files-found: error
