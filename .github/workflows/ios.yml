name: Linux Studio iOS Build

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:


jobs:

  build-ios:

    runs-on: macos-latest


    steps:


      - name: Checkout Repository
        uses: actions/checkout@v4





      - name: Setup Flutter
        uses: subosito/flutter-action@v2

        with:
          channel: stable
          cache: true





      - name: Flutter Doctor
        run: flutter doctor -v





      - name: Flutter Version
        run: flutter --version





      - name: Install Dependencies
        run: flutter pub get





      - name: Analyze Project
        run: flutter analyze





      - name: Verify iOS Project
        run: |
          ls ios
          ls ios/Runner





      - name: Enable iOS Build
        run: |
          flutter config --enable-ios





      - name: Build iOS Release (No Codesign)
        run: |

          flutter build ios \
            --release \
            --no-codesign





      - name: Package iOS App

        run: |

          mkdir -p artifacts

          cp -R \
          build/ios/iphoneos/Runner.app \
          artifacts/





      - name: Upload iOS Artifact

        uses: actions/upload-artifact@v4

        with:

          name: Linux-Studio-iOS-Release

          path: artifacts/
