```yaml
name: Linux Studio iOS Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: generated_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Enable iOS
        run: flutter config --enable-ios

      - name: Precache iOS
        run: flutter precache --ios

      - name: Build iOS Simulator
        run: flutter build ios --simulator --debug

      - name: Upload Runner.app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: generated_app/build/ios/iphonesimulator/Runner.app
          if-no-files-found: error
```
