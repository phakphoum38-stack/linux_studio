name: generated_app

description: Linux Studio - Cross-platform Linux terminal, container, and VM workspace

publish_to: "none"

version: 0.2.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI / State
  provider: ^6.1.5
  flutter_riverpod: ^2.6.1

  # Terminal
  xterm: ^4.0.0
  characters: ^1.4.0

  # File System
  file_picker: ^10.3.2
  path: ^1.9.1
  path_provider: ^2.1.5
  archive: ^4.0.7

  # Storage
  shared_preferences: ^2.5.3

  # SSH
  dartssh2: ^2.13.0

  # Native PTY / ConPTY
  ffi: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Generate FFI bindings
  ffigen: ^19.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/
